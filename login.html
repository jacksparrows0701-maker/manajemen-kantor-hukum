<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Manajemen Kantor Hukum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #1a5276, #2980b9); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .login-box { background: white; border-radius: 16px; padding: 40px 32px; width: 90%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .login-box h1 { text-align: center; color: #1a5276; font-size: 22px; margin-bottom: 6px; }
    .login-box .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; }
    .form-group input:focus { border-color: #2980b9; outline: none; }
    .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #1a5276, #2980b9); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error-msg { background: #fdecea; color: #e74c3c; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; text-align: center; }
    .link { text-align: center; margin-top: 16px; }
    .link a { color: #2980b9; font-size: 13px; cursor: pointer; text-decoration: none; }
    .link a:hover { text-decoration: underline; }

    /* Modal Ganti Password */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 12px; padding: 32px; width: 90%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; }
    .modal h2 { text-align: center; color: #1a5276; margin-bottom: 20px; font-size: 18px; }
    .modal .close-btn { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 24px; color: #999; cursor: pointer; }
    .modal .success-msg { background: #d4edda; color: #155724; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; text-align: center; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Manajemen Kantor Hukum</h1>
    <div class="subtitle">Masuk ke sistem manajemen</div>
    <div class="error-msg" id="loginError"></div>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Masukkan username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn" id="btnLogin">Login</button>
    </form>
    <div class="link">
      <a onclick="showChangePassword()">Ganti Password</a>
    </div>
  </div>

  <!-- Modal Ganti Password -->
  <div class="modal-overlay" id="cpModal">
    <div class="modal">
      <button class="close-btn" onclick="hideChangePassword()">&times;</button>
      <h2>Ganti Password</h2>
      <div class="error-msg" id="cpError"></div>
      <div class="success-msg" id="cpSuccess"></div>
      <form id="cpForm" onsubmit="doChangePassword(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="cpUsername" placeholder="Masukkan username" required>
        </div>
        <div class="form-group">
          <label>Password Lama</label>
          <input type="password" id="cpOldPassword" placeholder="Masukkan password lama" required>
        </div>
        <div class="form-group">
          <label>Password Baru</label>
          <input type="password" id="cpNewPassword" placeholder="Masukkan password baru" required>
        </div>
        <button type="submit" class="btn" id="btnCP">Ganti Password</button>
      </form>
    </div>
  </div>

  <script>
    var WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw7MIQVTCHfIUH5AWkDpqZOELeS5OyjE3kLnIpJfPUl4R9XCUrtp5rhsPvM_bfPGRhigA/exec';

    // Kalau sudah login, langsung ke index
    if (localStorage.getItem('adminLogin') === 'true') {
      window.location.href = 'index.html';
    }

    function doLogin(e) {
      e.preventDefault();
      var btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      document.getElementById('loginError').style.display = 'none';

      fetch(WEB_APP_URL + '?action=login&username=' + encodeURIComponent(document.getElementById('username').value) + '&password=' + encodeURIComponent(document.getElementById('password').value))
      .then(function(r) { return r.json(); }).then(function(res) {
        if (res.success) {
          localStorage.setItem('adminLogin', 'true');
          localStorage.setItem('adminName', res.nama);
          localStorage.setItem('adminRole', res.role);
          window.location.href = 'index.html';
        } else {
          document.getElementById('loginError').textContent = res.message;
          document.getElementById('loginError').style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Login';
      }).catch(function() {
        document.getElementById('loginError').textContent = 'Gagal menghubungi server';
        document.getElementById('loginError').style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      });
    }

    function showChangePassword() {
      document.getElementById('cpModal').classList.add('active');
      document.getElementById('cpError').style.display = 'none';
      document.getElementById('cpSuccess').style.display = 'none';
    }
    function hideChangePassword() {
      document.getElementById('cpModal').classList.remove('active');
    }

    function doChangePassword(e) {
      e.preventDefault();
      var btn = document.getElementById('btnCP');
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      document.getElementById('cpError').style.display = 'none';
      document.getElementById('cpSuccess').style.display = 'none';

      fetch(WEB_APP_URL + '?action=changePassword&username=' + encodeURIComponent(document.getElementById('cpUsername').value) + '&oldPassword=' + encodeURIComponent(document.getElementById('cpOldPassword').value) + '&newPassword=' + encodeURIComponent(document.getElementById('cpNewPassword').value))
      .then(function(r) { return r.json(); }).then(function(res) {
        if (res.success) {
          document.getElementById('cpSuccess').textContent = 'Password berhasil diganti!';
          document.getElementById('cpSuccess').style.display = 'block';
          document.getElementById('cpForm').reset();
        } else {
          document.getElementById('cpError').textContent = res.message;
          document.getElementById('cpError').style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Ganti Password';
      }).catch(function() {
        document.getElementById('cpError').textContent = 'Gagal menghubungi server';
        document.getElementById('cpError').style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ganti Password';
      });
    }
  </script>
</body>
</html>
